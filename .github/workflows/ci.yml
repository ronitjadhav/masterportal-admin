name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Fail only on real errors (syntax, undefined names) — not style opinions,
      # so CI stays green on formatting choices while catching genuine breakage.
      - run: pipx run ruff check --select E9,F63,F7,F82 .
      - run: python -m compileall -q app *.py

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      # Dev IdP: the realm (clients, roles, demo users) is imported from
      # keycloak/realm-masterportal.json. KC_HOSTNAME fixes the token issuer to
      # the public origin, so tokens minted via :8080 still validate.
      - name: Start Keycloak
        run: docker compose up -d keycloak
      - name: Wait for Keycloak realm
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:8080/auth/realms/masterportal >/dev/null && exit 0
            sleep 3
          done
          echo "Keycloak did not become ready"; docker compose logs keycloak; exit 1

      # Backend on SQLite (default) — migrations + `basic` auto-seed on start.
      - name: Start backend
        run: |
          uvicorn app.main:app --port 8000 >backend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/healthz >/dev/null && exit 0
            sleep 2
          done
          echo "backend did not become ready"; cat backend.log; exit 1

      # Full end-to-end suite. Self-seeds the `basic` fixture; touches live demo
      # upstreams (geodienste.hamburg.de) for the proxy checks.
      - name: Run e2e
        run: python test_e2e.py

      - name: Backend log on failure
        if: failure()
        run: cat backend.log || true
