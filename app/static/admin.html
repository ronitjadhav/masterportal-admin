<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>masterportal-admin</title>
<style>
/* ============================ design tokens ============================ */
:root {
  --bg: #f5f6f8;
  --surface: #ffffff;
  --surface-2: #fafbfc;
  --border: #e7e9ee;
  --border-strong: #d9dce2;
  --text: #101828;
  --text-muted: #667085;
  --text-faint: #98a2b3;
  --accent: #15a34a;
  --accent-soft: #e9fbef;
  --accent-border: #b6ebc6;
  --primary: #101828;
  --primary-hover: #1f2a3c;
  --danger: #d92d20;
  --danger-soft: #fef3f2;
  --warn: #b54708;
  --warn-soft: #fffaeb;
  --radius: 14px;
  --radius-sm: 9px;
  --radius-xs: 6px;
  --shadow-sm: 0 1px 2px rgba(16,24,40,.05);
  --shadow-md: 0 6px 20px rgba(16,24,40,.10);
  --sidebar-w: 250px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.45; }
a { color: inherit; text-decoration: none; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ============================ layout ============================ */
#app { display: flex; min-height: 100vh; }
.sidebar {
  width: var(--sidebar-w); flex: 0 0 var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.brand { display: flex; align-items: center; gap: .6rem; padding: 1.1rem 1.25rem; }
.brand .logo { width: 34px; height: 34px; border-radius: 9px; background: var(--primary); color: #fff;
  display: grid; place-items: center; flex: 0 0 34px; }
.brand .name { font-weight: 650; font-size: 14px; line-height: 1.15; }
.brand .name small { display: block; color: var(--text-faint); font-weight: 500; font-size: 11.5px; }
.nav { flex: 1; overflow-y: auto; padding: .4rem .75rem; }
.nav-group { margin-top: 1rem; }
.nav-group > .label { padding: .3rem .6rem; font-size: 11px; font-weight: 600; letter-spacing: .06em;
  color: var(--text-faint); text-transform: uppercase; }
.nav-item { display: flex; align-items: center; gap: .65rem; padding: .5rem .6rem; border-radius: var(--radius-sm);
  color: var(--text-muted); font-weight: 500; cursor: pointer; margin: 1px 0; border: 1px solid transparent; }
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item .icon { color: var(--text-faint); display: inline-flex; }
.nav-item.active { background: var(--surface); color: var(--text); font-weight: 600;
  border-color: var(--border); box-shadow: var(--shadow-sm); }
.nav-item.active .icon { color: var(--accent); }
.nav-item .count { margin-left: auto; background: var(--bg); color: var(--text-muted);
  font-size: 11px; font-weight: 600; border-radius: 999px; padding: .05rem .45rem; }
.sidebar-foot { border-top: 1px solid var(--border); padding: .8rem 1rem; display: flex; align-items: center; gap: .6rem; }
.sidebar-foot .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-soft);
  color: var(--accent); display: grid; place-items: center; font-weight: 700; font-size: 12px; }
.sidebar-foot .who { font-size: 12.5px; font-weight: 600; }
.sidebar-foot .who small { display: block; color: var(--text-faint); font-weight: 500; }

.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar { display: flex; align-items: center; gap: 1rem; padding: 1.1rem 1.9rem .4rem; }
.topbar .titles h1 { margin: 0; font-size: 20px; font-weight: 650; letter-spacing: -.01em; }
.topbar .titles p { margin: .15rem 0 0; color: var(--text-muted); font-size: 13px; }
.topbar .spacer { flex: 1; }
.content { padding: 1.1rem 1.9rem 2.5rem; }

/* ============================ components ============================ */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow-sm); margin-bottom: 1.1rem; }
.card > .card-head { display: flex; align-items: center; gap: .6rem; padding: .95rem 1.15rem; border-bottom: 1px solid var(--border); }
.card > .card-head h2 { margin: 0; font-size: 15px; font-weight: 620; }
.card > .card-head .sub { color: var(--text-muted); font-size: 12.5px; }
.card > .card-head .actions { margin-left: auto; display: flex; gap: .5rem; align-items: center; }
.card > .card-body { padding: 1.15rem; }
.card > .card-body.flush { padding: 0; }

.btn { display: inline-flex; align-items: center; gap: .4rem; font: inherit; font-weight: 550; font-size: 13px;
  padding: .5rem .85rem; border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
  background: var(--surface); color: var(--text); cursor: pointer; white-space: nowrap; transition: background .12s, border-color .12s; }
.btn:hover { background: var(--surface-2); }
.btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.btn.primary:hover { background: var(--primary-hover); }
.btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.accent:hover { filter: brightness(.95); }
.btn.ghost { border-color: transparent; background: transparent; color: var(--text-muted); padding: .35rem .5rem; }
.btn.ghost:hover { background: var(--surface-2); color: var(--text); }
.btn.danger { color: var(--danger); border-color: var(--border-strong); }
.btn.danger:hover { background: var(--danger-soft); border-color: var(--danger); }
.btn.sm { padding: .3rem .55rem; font-size: 12px; }
.btn.icon { padding: .35rem; }
.btn[disabled] { opacity: .5; cursor: not-allowed; }

.badge { display: inline-flex; align-items: center; gap: .3rem; font-size: 11.5px; font-weight: 600;
  padding: .12rem .5rem; border-radius: 999px; border: 1px solid transparent; }
.badge.green { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
.badge.amber { background: var(--warn-soft); color: var(--warn); border-color: #fedf89; }
.badge.gray { background: var(--bg); color: var(--text-muted); border-color: var(--border); }
.badge.violet { background: #f4f0ff; color: #6941c6; border-color: #e0d5ff; }

table.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
table.tbl th { text-align: left; padding: .6rem 1.15rem; color: var(--text-faint); font-size: 11px;
  font-weight: 600; letter-spacing: .04em; text-transform: uppercase; background: var(--surface-2);
  border-bottom: 1px solid var(--border); position: sticky; top: 0; }
table.tbl td { padding: .6rem 1.15rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
table.tbl tr:last-child td { border-bottom: 0; }
table.tbl tbody tr:hover { background: var(--surface-2); }
.tbl-scroll { max-height: 65vh; overflow: auto; border-radius: 0 0 var(--radius) var(--radius); }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--text-muted); }

.field { display: flex; flex-direction: column; gap: .3rem; }
.field > label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
input, select, textarea { font: inherit; font-size: 13px; padding: .5rem .65rem; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); background: var(--surface); color: var(--text); width: 100%; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.inline-form { display: flex; gap: .6rem; align-items: flex-end; flex-wrap: wrap; }
.inline-form .field { flex: 1; min-width: 130px; }

.empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); }
.empty .icon { color: var(--text-faint); margin-bottom: .5rem; display: inline-flex; }
.empty h3 { margin: .2rem 0; font-size: 15px; color: var(--text); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.1rem; }
@media (max-width: 820px) { .grid-2 { grid-template-columns: 1fr; } .sidebar { position: fixed; z-index: 20; transform: translateX(-100%); transition: transform .2s; } }

.icon svg { display: block; }
.hint { color: var(--text-muted); font-size: 12.5px; }
.banner { display: flex; align-items: center; gap: .55rem; padding: .7rem 1rem; border-radius: var(--radius-sm);
  font-size: 13px; margin-bottom: 1rem; border: 1px solid; }
.banner.info { background: var(--surface); border-color: var(--border); color: var(--text-muted); }
.banner.warn { background: var(--warn-soft); border-color: #fedf89; color: var(--warn); }
.banner.ok { background: var(--accent-soft); border-color: var(--accent-border); color: var(--accent); }

/* toasts */
#toasts { position: fixed; bottom: 1.2rem; right: 1.2rem; display: flex; flex-direction: column; gap: .5rem; z-index: 50; }
.toast { background: var(--primary); color: #fff; padding: .65rem .9rem; border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md); font-size: 13px; max-width: 360px; animation: rise .18s ease; }
.toast.error { background: var(--danger); }
.toast.success { background: var(--accent); }
@keyframes rise { from { opacity: 0; transform: translateY(8px); } }

/* drawer (layer picker) */
.drawer-mask { position: fixed; inset: 0; background: rgba(16,24,40,.35); z-index: 40; }
.drawer { position: fixed; top: 0; right: 0; height: 100vh; width: 380px; background: var(--surface);
  box-shadow: var(--shadow-md); z-index: 41; display: flex; flex-direction: column; }
.drawer .dhead { display: flex; align-items: center; padding: 1rem 1.15rem; border-bottom: 1px solid var(--border); }
.drawer .dhead h2 { margin: 0; font-size: 15px; font-weight: 620; flex: 1; }
.drawer .dbody { padding: 1.15rem; overflow-y: auto; }
.hit { padding: .55rem .6rem; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent; }
.hit:hover { background: var(--accent-soft); border-color: var(--accent-border); }
.hit .lid { color: var(--text-faint); font-size: 12px; }
.swatch { width: 40px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: repeating-conic-gradient(#eee 0 25%, #fff 0 50%) 50%/10px 10px; display: inline-flex; }
.swatch svg, .style-preview svg { display: block; margin: auto; }
.color-row { display: flex; gap: .4rem; align-items: center; }
.color-row input[type=color] { width: 46px; height: 34px; padding: 2px; border-radius: var(--radius-sm); }
.style-preview { width: 100%; max-width: 220px; height: 130px; border-radius: var(--radius); border: 1px solid var(--border); background: repeating-conic-gradient(#f0f0f0 0 25%, #fff 0 50%) 50%/16px 16px; display: grid; place-items: center; }

/* tree */
.tree-group { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); margin-bottom: 1rem; }
.tree-group > .chdr { display: flex; align-items: center; gap: .5rem; padding: .7rem 1rem; border-bottom: 1px solid var(--border); font-weight: 620; font-size: 14px; }
.tree-group > .chdr .actions { margin-left: auto; display: flex; gap: .4rem; }
ul.tree { list-style: none; margin: .3rem 0 .3rem 1.15rem; padding: 0; }
ul.tree.root { margin: .5rem; }
li.node > .rowline { display: flex; gap: .4rem; align-items: center; padding: .32rem .45rem; border-radius: var(--radius-xs); }
li.node > .rowline:hover { background: var(--surface-2); }
.grip { cursor: grab; color: var(--text-faint); font-size: 14px; }
.drop-into { outline: 2px dashed var(--accent); outline-offset: 2px; background: var(--accent-soft); }
.fname { max-width: 220px; padding: .2rem .4rem; }
.lyr .lid { color: var(--text-faint); font-size: 12px; }
.row-actions { margin-left: auto; display: flex; gap: .25rem; opacity: .55; }
li.node > .rowline:hover .row-actions { opacity: 1; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>
<script>
"use strict";

/* ============================ tiny helpers ============================ */
const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const attr = s => esc(s).replace(/"/g, "&quot;");

async function api(path, options = {}) {
  const r = await fetch(path, {credentials: "same-origin", ...options,
    headers: {"Content-Type": "application/json", ...(options.headers || {})}});
  if (r.status === 401) { location.href = "/admin/login"; throw new Error("__login__"); }
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.statusText);
  return r.status === 204 ? null : r.json();
}
function toast(msg, tone = "info") {
  if (msg === "__login__") return;
  const el = document.createElement("div");
  el.className = "toast " + tone; el.textContent = msg;
  $("#toasts").appendChild(el);
  setTimeout(() => el.remove(), tone === "error" ? 5000 : 2600);
}
const fail = e => toast(e.message || String(e), "error");

/* ============================ icons (inline, CSP-safe) ============================ */
const P = {
  layers: 'M12 2 2 7l10 5 10-5-10-5Z M2 17l10 5 10-5 M2 12l10 5 10-5',
  tree: 'M6 3v12 M6 15a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z M18 6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z M18 6v3a3 3 0 0 1-3 3H6',
  shield: 'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z M9 12l2 2 4-4',
  publish: 'M12 15V3 M7 8l5-5 5 5 M5 21h14',
  import: 'M12 3v12 M17 10l-5 5-5-5 M5 21h14',
  audit: 'M12 8v4l3 2 M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z',
  logout: 'M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4 M16 17l5-5-5-5 M21 12H9',
  search: 'M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z M21 21l-4-4',
  folder: 'M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z',
  plus: 'M12 5v14 M5 12h14',
  x: 'M18 6 6 18 M6 6l12 12',
  up: 'M12 19V5 M5 12l7-7 7 7',
  down: 'M12 5v14 M19 12l-7 7-7-7',
  grip: 'M9 5h.01 M9 12h.01 M9 19h.01 M15 5h.01 M15 12h.01 M15 19h.01',
  map: 'M9 3 3 6v15l6-3 6 3 6-3V3l-6 3-6-3Z M9 3v15 M15 6v15',
  check: 'M20 6 9 17l-5-5',
  sliders: 'M4 21v-7 M4 10V3 M12 21v-9 M12 8V3 M20 21v-5 M20 12V3 M1 14h6 M9 8h6 M17 16h6',
  grid: 'M3 3h7v7H3z M14 3h7v7h-7z M14 14h7v7h-7z M3 14h7v7H3z',
  trash: 'M3 6h18 M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2 M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6',
  code: 'M16 18l6-6-6-6 M8 6l-6 6 6 6',
  brush: 'M9.06 11.9l8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08 M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02Z',
};
function icon(name, size = 18) {
  return `<span class="icon"><svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none"
    stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${
    (P[name] || "").split(" M").map((d, i) => `<path d="${i ? "M" + d : d}"/>`).join("")}</svg></span>`;
}

/* ============================ UI component library ============================ */
const UI = {
  card: ({title, sub, actions, body, flush}) =>
    `<section class="card">${title ? `<div class="card-head"><div>
        <h2>${esc(title)}</h2>${sub ? `<div class="sub">${esc(sub)}</div>` : ""}</div>
        ${actions ? `<div class="actions">${actions}</div>` : ""}</div>` : ""}
      <div class="card-body${flush ? " flush" : ""}">${body}</div></section>`,
  btn: ({label, variant = "", onclick = "", icon: ic, size = "", disabled}) =>
    `<button class="btn ${variant} ${size}" ${disabled ? "disabled" : ""} ${onclick ? `onclick="${attr(onclick)}"` : ""}>${
      ic ? icon(ic, 15) : ""}${label ? `<span>${esc(label)}</span>` : ""}</button>`,
  badge: (text, tone = "gray") => `<span class="badge ${tone}">${esc(text)}</span>`,
  table: ({cols, rows, empty}) => rows.length
    ? `<div class="tbl-scroll"><table class="tbl"><thead><tr>${cols.map(c => `<th>${esc(c)}</th>`).join("")}</tr></thead>
        <tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`
    : UI.empty(empty || {title: "Nothing here yet"}),
  field: ({label, control, hint}) =>
    `<div class="field"><label>${esc(label)}</label>${control}${hint ? `<span class="hint">${esc(hint)}</span>` : ""}</div>`,
  empty: ({icon: ic = "layers", title, hint}) =>
    `<div class="empty">${icon(ic, 30)}<h3>${esc(title)}</h3>${hint ? `<div class="hint">${esc(hint)}</div>` : ""}</div>`,
  banner: (text, tone = "info", ic = "audit") => `<div class="banner ${tone}">${icon(ic, 16)}<span>${text}</span></div>`,
};

/* ============================ app state + nav model ============================ */
const state = { portals: [], portal: null, whoami: "admin" };
const catalogOf = slug => (state.portals.find(p => p.slug === slug) || {}).catalog;

const NAV = [
  {group: "Portal", items: [
    {route: "settings", label: "Settings", icon: "sliders"},
    {route: "tree", label: "Layers", icon: "tree"},
    {route: "modules", label: "Tools & plugins", icon: "grid"},
    {route: "publish", label: "Publish", icon: "publish"},
    {route: "advanced", label: "Advanced config", icon: "code"},
  ]},
  {group: "Library", items: [
    {route: "services", label: "Catalog", icon: "layers"},
    {route: "styles", label: "Styles", icon: "brush"},
    {route: "import", label: "Import WMS", icon: "import"},
  ]},
  {group: "System", items: [
    {route: "grants", label: "Access & roles", icon: "shield"},
    {route: "audit", label: "Audit log", icon: "audit"},
  ]},
];
const PAGES = {
  settings: {title: "Portal settings", sub: "Branding, map view and controls for this portal"},
  tree: {title: "Layers", sub: "The layers in this portal — their type, access and style"},
  modules: {title: "Tools & plugins", sub: "Enable the tools available in this portal"},
  advanced: {title: "Advanced config", sub: "Edit the raw portalConfig for fields not yet in the forms"},
  publish: {title: "Publish", sub: "Stage the draft, publish a version, roll back"},
  services: {title: "Catalog", sub: "Shared library of all available layers — add these to a portal's Layers"},
  styles: {title: "Vector styles", sub: "Reusable styling for WFS/OAF/GeoJSON layers (style.json)"},
  import: {title: "Import WMS", sub: "Add layers from a WMS GetCapabilities document"},
  grants: {title: "Access & roles", sub: "Who may use secured layers, modules and portals"},
  audit: {title: "Audit log", sub: "Every administrative change, most recent first"},
};

/* ============================ shell ============================ */
function renderShell(route) {
  const nav = NAV.map(g => `<div class="nav-group"><div class="label">${g.group}</div>${
    g.items.map(it => `<a class="nav-item ${it.route === route ? "active" : ""}" href="#${it.route}">
      ${icon(it.icon)}<span>${it.label}</span></a>`).join("")}</div>`).join("");
  const portalSel = `<select onchange="App.setPortal(this.value)" style="width:auto;min-width:170px">${
    state.portals.map(p => `<option value="${attr(p.slug)}" ${p.slug === state.portal ? "selected" : ""}>${
      esc(p.title || p.slug)} (${esc(p.slug)})</option>`).join("")}</select>`;
  const pg = PAGES[route];
  $("#app").innerHTML = `
    <aside class="sidebar">
      <div class="brand"><span class="logo">${icon("map", 19)}</span>
        <span class="name">Masterportal<small>admin console</small></span></div>
      <nav class="nav">${nav}</nav>
      <div class="sidebar-foot"><span class="avatar">${esc(state.whoami.slice(0,2).toUpperCase())}</span>
        <span class="who">${esc(state.whoami)}<small>administrator</small></span>
        <button class="btn ghost icon" style="margin-left:auto" title="Log out"
          onclick="App.logout()">${icon("logout", 17)}</button></div>
    </aside>
    <div class="main">
      <div class="topbar"><div class="titles"><h1>${esc(pg.title)}</h1><p>${esc(pg.sub)}</p></div>
        <div class="spacer"></div>
        <div class="field" style="flex-direction:row;align-items:center;gap:.5rem">
          <label style="white-space:nowrap">Portal</label>${portalSel}
          ${UI.btn({label: "New", icon: "plus", onclick: "App.newPortal()"})}</div>
      </div>
      <div class="content" id="view"></div>
    </div>
    <div id="modal-root"></div>`;
}

/* ============================ views ============================ */
const V = {};

V.services = async () => {
  const cat = catalogOf(state.portal);
  const q = window.__svcQ || "";
  const onlyIn = window.__svcOnlyIn || false;
  const search = `<div style="display:flex;gap:.5rem;flex:1;max-width:520px;align-items:center">
      <div style="position:relative;flex:1">
        <span style="position:absolute;left:.6rem;top:.55rem;color:var(--text-faint)">${icon("search",16)}</span>
        <input id="svcq" value="${attr(q)}" placeholder="Search id or name…" style="padding-left:2rem"
          onkeydown="if(event.key==='Enter')App.searchServices()"></div>
      ${UI.btn({label: "Search", onclick: "App.searchServices()"})}
      <label style="display:flex;gap:.35rem;align-items:center;white-space:nowrap;font-size:12.5px;color:var(--text-muted)">
        <input type="checkbox" ${onlyIn ? "checked" : ""} onchange="App.toggleOnlyIn(this.checked)" style="width:auto"> in this portal only</label>`;
  $("#view").innerHTML =

// ---------------- Vector styles ----------------
let _styleEdit = null;  // {key, styleId, attrs, usage, mode} when editing, else null

const rgba = a => Array.isArray(a) ? `rgba(${a[0]|0},${a[1]|0},${a[2]|0},${a.length>3?a[3]:1})` : "transparent";
function rgbaHex(a) { const h = n => ("0" + (n|0).toString(16)).slice(-2); return a ? "#" + h(a[0]) + h(a[1]) + h(a[2]) : "#888888"; }
function rgbaAlpha(a) { return a && a.length > 3 ? a[3] : 1; }
function hexAlpha(hex, al) { const n = parseInt(hex.slice(1), 16); return [(n>>16)&255, (n>>8)&255, n&255, Number(al)]; }

function styleKind(st) {
  if (!st) return "other";
  if (st.type === "icon" || st.imageName) return "icon";
  if (st.type === "circle" || "circleRadius" in st || "circleFillColor" in st) return "circle";
  if (st.type === "text" || "labelField" in st || "text" in st) return "text";
  if ("lineStrokeColor" in st || st.type === "line") return "line";
  if ("polygonFillColor" in st || "polygonStrokeColor" in st || "polygonFillHatch" in st) return "polygon";
  return "other";
}
function swatch(st, size = 28) {
  const k = styleKind(st), s = size, m = size / 2;
  const fill = rgba(st && (st.circleFillColor || st.polygonFillColor) || [150,150,150,0.6]);
  const stroke = rgba(st && (st.circleStrokeColor || st.polygonStrokeColor || st.lineStrokeColor) || [40,40,40,1]);
  const sw = st && (st.circleStrokeWidth || st.polygonStrokeWidth || st.lineStrokeWidth) || 1;
  let inner = "";
  if (k === "circle") inner = `<circle cx="${m}" cy="${m}" r="${Math.max(3, m-4)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
  else if (k === "polygon") inner = `<rect x="3" y="3" width="${s-6}" height="${s-6}" rx="2" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
  else if (k === "line") inner = `<line x1="3" y1="${s-4}" x2="${s-3}" y2="4" stroke="${stroke}" stroke-width="${Math.max(2,sw)}" stroke-linecap="round"/>`;
  else if (k === "icon") inner = `<rect x="4" y="4" width="${s-8}" height="${s-8}" rx="3" fill="#e6eefc" stroke="#93b4f0"/><text x="${m}" y="${m+3}" font-size="9" text-anchor="middle" fill="#3b6fd4">IMG</text>`;
  else if (k === "text") inner = `<text x="${m}" y="${m+4}" font-size="14" text-anchor="middle" fill="${rgba(st.textFillColor||[40,40,40,1])}">T</text>`;
  else inner = `<text x="${m}" y="${m+3}" font-size="8" text-anchor="middle" fill="#999">?</text>`;
  return `<span class="swatch" style="width:${s+12}px;height:${s+2}px"><svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">${inner}</svg></span>`;
}

function styleWorking() {   // guarantee a live rules[0].style object to mutate
  const a = _styleEdit.attrs;
  if (!Array.isArray(a.rules) || !a.rules.length) a.rules = [{style: {}}];
  if (!a.rules[0].style || typeof a.rules[0].style !== "object") a.rules[0].style = {};
  return a.rules[0].style;
}

function renderStyleEditor() {
  const e = _styleEdit, st = styleWorking(), kind = styleKind(st);
  const simple = e.attrs.rules.length === 1 && ["circle","icon","line","polygon"].includes(kind);
  const usage = e.usage.length ? UI.badge(`${e.usage.length} layer(s): ${e.usage.slice(0,6).join(", ")}`, "green") : UI.badge("unused","gray");
  const head = `<div style="display:flex;align-items:center;gap:.6rem;margin-bottom:1rem">
      ${UI.btn({label:"Back", onclick:"App.closeStyle()"})}
      <h2 style="margin:0;font-size:17px">Style <span class="mono">${esc(e.styleId)}</span></h2> ${usage}
      <span style="flex:1"></span>
      ${UI.btn({label:"Save", variant:"primary", icon:"check", onclick:"App.saveStyle()"})}
      ${UI.btn({label:"Delete", variant:"danger", icon:"trash", onclick:"App.delStyle()"})}</div>`
    + (e.confirmDel ? `<div class="banner warn">${icon("trash",16)}<span>Delete style
        <b>${esc(e.styleId)}</b>?${e.usage.length ? ` It is used by ${e.usage.length} layer(s) — they will fall back to default rendering.` : ""}</span>
        <span style="margin-left:auto;display:flex;gap:.4rem">
        ${UI.btn({label:"Confirm delete", variant:"danger", size:"sm", onclick:"App.delStyleConfirm()"})}
        ${UI.btn({label:"Cancel", size:"sm", onclick:"App.delCancel()"})}</span></div>` : "");
  let bodyCard;
  if (e.mode === "raw" || !simple) {
    if (!simple && e.mode !== "raw")
      $("#view"); // fallthrough to raw with note
    bodyCard = UI.card({title:"Style JSON", sub: simple ? "" : "This style uses rules/conditions the form doesn't cover — edit as JSON",
      actions: simple ? UI.btn({label:"Form editor", size:"sm", onclick:"App.styleMode('form')"}) : "",
      body:`<div id="sty-err"></div><textarea id="sty-json" spellcheck="false" style="width:100%;height:44vh;font-family:ui-monospace,monospace;font-size:12.5px;white-space:pre">${esc(JSON.stringify(e.attrs, null, 2))}</textarea>`});
    $("#view").innerHTML = head + bodyCard; return;
  }
  // structured form for the recognized kind
  const cf = (label, prop) => `<div class="field"><label>${label}</label><div class="color-row">
      <input type="color" id="${prop}-c" value="${rgbaHex(st[prop])}" oninput="App.styleColor('${prop}')">
      <input type="number" id="${prop}-a" value="${rgbaAlpha(st[prop])}" min="0" max="1" step="0.1" title="opacity" oninput="App.styleColor('${prop}')" style="width:74px"></div></div>`;
  const nf = (label, prop, step) => UI.field({label, control:`<input type="number" id="s-${prop}" value="${attr(st[prop]??'')}" step="${step||1}" oninput="App.styleNum('${prop}')">`});
  const tf = (label, prop) => UI.field({label, control:`<input id="s-${prop}" value="${attr(st[prop]??'')}" oninput="App.styleText('${prop}')">`});
  let fields = "";
  if (kind === "circle") fields = `<div class="grid-2">${cf("Fill","circleFillColor")}${cf("Stroke","circleStrokeColor")}</div>
      <div class="grid-2" style="margin-top:.7rem">${nf("Radius","circleRadius")}${nf("Stroke width","circleStrokeWidth")}</div>`;
  else if (kind === "polygon") fields = `<div class="grid-2">${cf("Fill","polygonFillColor")}${cf("Stroke","polygonStrokeColor")}</div>
      <div style="margin-top:.7rem">${nf("Stroke width","polygonStrokeWidth")}</div>`;
  else if (kind === "line") fields = `<div class="grid-2">${cf("Line color","lineStrokeColor")}${nf("Line width","lineStrokeWidth")}</div>`;
  else if (kind === "icon") fields = `<div class="grid-2">${tf("Image name / URL","imageName")}${nf("Scale","imageScale",0.1)}</div>`;
  $("#view").innerHTML = head + `<div class="grid-2">
      ${UI.card({title:`${kind} style`, body: fields})}
      ${UI.card({title:"Preview", body:`<div class="style-preview" id="sty-preview">${swatch(st,90)}</div>
        <div style="margin-top:.8rem">${UI.btn({label:"Edit as JSON (advanced)", size:"sm", onclick:"App.styleMode('raw')"})}</div>`})}
    </div>`;
}

    + `<div id="picker-root"></div>`;
  try {
    const t = await api(`/api/admin/portals/${encodeURIComponent(state.portal)}/tree`);
    TREE = t.layer_config; NAMES = t.names || {}; TREE_CATALOG = t.catalog;
    LAYERS = t.layers || {}; STYLE_SWATCHES = t.styleSwatches || {};
    for (const g of ["baselayer", "subjectlayer"]) if (!TREE[g]) TREE[g] = {elements: []};
    for (const g of ["baselayer", "subjectlayer"]) assignUids(TREE[g].elements);
    renderTree();
  } catch (e) { fail(e); }
};
function assignUids(els) { for (const el of els || []) { el._uid = "u" + (UID++); if (el.type === "folder") assignUids(el.elements || (el.elements = [])); } }
function findNode(uid, els) { for (let i = 0; i < els.length; i++) { if (els[i]._uid === uid) return {node: els[i], parent: els, index: i}; if (els[i].type === "folder") { const h = findNode(uid, els[i].elements); if (h) return h; } } return null; }
function locate(uid) { for (const g of ["baselayer", "subjectlayer"]) { const h = findNode(uid, TREE[g].elements); if (h) return h; } return null; }
function containerArray(cuid) { if (cuid.startsWith("g:")) return TREE[cuid.slice(2)].elements; const h = locate(cuid); if (!h || h.node.type !== "folder") return null; return h.node.elements || (h.node.elements = []); }
function isWithin(cuid, srcUid) { if (cuid.startsWith("g:") || cuid === srcUid) return cuid === srcUid; const s = locate(srcUid); return s && s.node.type === "folder" && !!findNode(cuid, s.node.elements); }
function moveNode(src, dest) { if (isWithin(dest, src)) return; const d = containerArray(dest); if (!d) return; const h = locate(src); if (!h) return; const [n] = h.parent.splice(h.index, 1); d.push(n); renderTree(); }
function layerInfo(el) {
  const group = Array.isArray(el.id);
  const base = group ? null : String(el.id).split(".")[0];
  const svc = base ? (LAYERS[base] || {}) : {};
  return {group, base, typ: group ? "GROUP" : svc.typ,
          name: el.name || svc.name || (group ? el.id.join(", ") : ""),
          isPublic: svc.is_public, styleId: el.styleId || svc.styleId,
          overridden: !!el.styleId, known: base ? base in LAYERS : true};
}
function layerLabel(el) {
  const i = layerInfo(el);
  const nm = `<span class="lyr">${esc(i.name)} <span class="lid">${esc(Array.isArray(el.id) ? el.id.join(",") : el.id)}</span></span>`;
  const typ = i.typ ? UI.badge(i.typ, i.typ === "GROUP" ? "violet" : "gray") : (i.known ? "" : UI.badge("inline", "gray"));
  const access = i.isPublic === false ? UI.badge("login", "amber") : (i.isPublic ? UI.badge("public", "green") : "");
  let style = "";
  if (i.styleId) {
    const sw = STYLE_SWATCHES[String(i.styleId)];
    style = `<span title="style: ${attr(i.styleId)}${i.overridden ? ' (per-layer override)' : ''}" style="display:inline-flex;align-items:center;gap:.25rem">
      ${sw ? swatch(sw, 18) : ""}<span class="lid">${esc(i.styleId)}${i.overridden ? "*" : ""}</span></span>`;
  }
  return `${nm}<span style="display:inline-flex;gap:.4rem;align-items:center;margin-left:.5rem">${typ}${access}${style}</span>`;
}
function renderElements(els) {
  return `<ul class="tree">` + els.map(el => {
    const ctrls = `<div class="row-actions">
      ${UI.btn({icon: "up", variant: "ghost", size: "sm", onclick: `App.treeReorder('${el._uid}',-1)`})}
      ${UI.btn({icon: "down", variant: "ghost", size: "sm", onclick: `App.treeReorder('${el._uid}',1)`})}
      ${UI.btn({icon: "x", variant: "ghost", size: "sm", onclick: `App.treeRemove('${el._uid}')`})}</div>`;
    if (el.type === "folder")
      return `<li class="node" draggable="true" data-uid="${el._uid}" data-container="${el._uid}">
        <div class="rowline"><span class="grip">${icon("grip",16)}</span>${icon("folder",16)}
          <input class="fname" value="${attr(el.name)}" oninput="App.treeRename('${el._uid}',this.value)">
          ${UI.btn({label: "folder", icon: "plus", variant: "ghost", size: "sm", onclick: `App.treeAddFolder('${el._uid}')`})}
          ${UI.btn({label: "layer", icon: "plus", variant: "ghost", size: "sm", onclick: `App.openPicker('${el._uid}')`})}
          ${ctrls}</div>${renderElements(el.elements || [])}</li>`;
    const i = layerInfo(el);
    const vector = ["WFS", "OAF", "GeoJSON", "VectorTile", "SensorThings"].includes(i.typ);
    const styleBtn = (!i.group && (vector || i.styleId))
      ? UI.btn({label: "Style", icon: "brush", variant: "ghost", size: "sm", onclick: `App.pickStyle('${el._uid}')`}) : "";
    return `<li class="node" draggable="true" data-uid="${el._uid}">
      <div class="rowline"><span class="grip">${icon("grip",16)}</span>${layerLabel(el)}
        <div class="row-actions">${styleBtn}
          ${UI.btn({icon: "up", variant: "ghost", size: "sm", onclick: `App.treeReorder('${el._uid}',-1)`})}
          ${UI.btn({icon: "down", variant: "ghost", size: "sm", onclick: `App.treeReorder('${el._uid}',1)`})}
          ${UI.btn({icon: "x", variant: "ghost", size: "sm", onclick: `App.treeRemove('${el._uid}')`})}</div>
      </div></li>`;
  }).join("") + `</ul>`;
}
function renderGroup(g) {
  return `<div class="tree-group" data-container="g:${g}"><div class="chdr">${icon("layers",16)} ${g}
    <div class="actions">
      ${UI.btn({label: "Folder", icon: "plus", size: "sm", onclick: `App.treeAddFolder('g:${g}')`})}
      ${UI.btn({label: "Layer", icon: "plus", size: "sm", variant: "accent", onclick: `App.openPicker('g:${g}')`})}</div>
    </div>${renderElements(TREE[g].elements)}</div>`;
}
function renderTree() {
  $("#tree-baselayer").innerHTML = renderGroup("baselayer");
  $("#tree-subjectlayer").innerHTML = renderGroup("subjectlayer");
  document.querySelectorAll("#view [draggable=true]").forEach(li => {
    li.ondragstart = e => { DRAG_UID = li.dataset.uid; e.stopPropagation(); e.dataTransfer.effectAllowed = "move"; };
  });
  document.querySelectorAll("#view [data-container]").forEach(box => {
    box.ondragover = e => { e.preventDefault(); e.stopPropagation(); box.classList.add("drop-into"); };
    box.ondragleave = () => box.classList.remove("drop-into");
    box.ondrop = e => { e.preventDefault(); e.stopPropagation(); box.classList.remove("drop-into");
      if (DRAG_UID) moveNode(DRAG_UID, box.dataset.container); DRAG_UID = null; };
  });
}
function stripUids(n) { if (Array.isArray(n)) return n.map(stripUids);
  if (n && typeof n === "object") return Object.fromEntries(Object.entries(n).filter(([k]) => k !== "_uid").map(([k, v]) => [k, stripUids(v)])); return n; }

/* ============================ action handlers ============================ */
const App = {
  setPortal(slug) { state.portal = slug; navigate(); },
  logout() { const f = document.createElement("form"); f.method = "post"; f.action = "/admin/logout"; document.body.appendChild(f); f.submit(); },

  // ---- portal lifecycle ----
  newPortal() {
    const catalogs = [...new Set(state.portals.map(p => p.catalog))];
    $("#modal-root").innerHTML = `<div class="drawer-mask" onclick="App.closeModal()"></div>
      <div class="drawer"><div class="dhead"><h2>New portal</h2>
        ${UI.btn({icon: "x", variant: "ghost", onclick: "App.closeModal()"})}</div>
        <div class="dbody">
          ${UI.field({label: "Slug (URL id, fixed)", control: `<input id="np-slug" placeholder="my-portal">`,
            hint: "lowercase, digits, - or _"})}
          <div style="height:.7rem"></div>
          ${UI.field({label: "Title", control: `<input id="np-title" placeholder="My Geoportal">`})}
          <div style="height:.7rem"></div>
          ${UI.field({label: "Description (optional)", control: `<input id="np-desc" placeholder="short note">`})}
          <div style="height:.7rem"></div>
          ${UI.field({label: "Catalog (shared service pool)", control: `<select id="np-catalog">
            ${catalogs.map(c => `<option>${esc(c)}</option>`).join("")}</select>`,
            hint: "which services this portal can use"})}
          <div style="height:1rem"></div>
          ${UI.btn({label: "Create portal", variant: "primary", icon: "plus", onclick: "App.createPortal()"})}
        </div></div>`;
    setTimeout(() => document.getElementById("np-slug")?.focus(), 30);
  },
  closeModal() { const r = $("#modal-root"); if (r) r.innerHTML = ""; },
  async createPortal() {
    try {
      const r = await api("/api/admin/portals", {method: "POST", body: JSON.stringify(
        {slug: val("np-slug"), title: val("np-title"), description: val("np-desc"), catalog: val("np-catalog")})});
      this.closeModal(); toast(`Portal “${r.slug}” created`, "success");
      state.portals = await api("/api/admin/portals");
      state.portal = r.slug; location.hash = "settings"; navigate();
    } catch (e) { fail(e); }
  },
  confirmDelete() {
    $("#del-slot").innerHTML = `<span class="hint">Delete “${esc(state.portal)}”?</span>
      ${UI.btn({label: "Yes, delete", variant: "danger", size: "sm", onclick: "App.deletePortal()"})}
      ${UI.btn({label: "Cancel", size: "sm", onclick: "V.settings()"})}`;
  },
  async deletePortal() {
    try {
      await api(`/api/admin/portals/${encodeURIComponent(state.portal)}`, {method: "DELETE"});
      toast("Portal deleted", "success");
      state.portals = await api("/api/admin/portals");
      state.portal = state.portals[0].slug; location.hash = "settings"; navigate();
    } catch (e) { fail(e); V.settings(); }
  },

  async saveSettings() {
    const cx = parseFloat(val("set-cx")), cy = parseFloat(val("set-cy")), z = val("set-zoom");
    const payload = {
      description: val("set-desc"),
      title: {text: val("set-title"), logo: val("set-logo"), link: val("set-link"), toolTip: val("set-tooltip")},
      map: {startingMapMode: val("set-mode"), epsg: val("set-epsg"), backgroundImage: val("set-bg"),
            startZoomLevel: z === "" ? null : Number(z),
            startCenter: (isNaN(cx) || isNaN(cy)) ? [] : [cx, cy]},
      controls: Object.fromEntries(SETTINGS ? Object.keys(SETTINGS.controls).map(
        c => [c, document.getElementById("ctl-" + c)?.checked || false]) : []),
    };
    try { await api(`/api/admin/portals/${encodeURIComponent(state.portal)}/settings`,
      {method: "PATCH", body: JSON.stringify(payload)});
      toast("Settings saved to draft", "success"); V.settings(); } catch (e) { fail(e); }
  },
  async toggleModule(type, enabled) {
    try { await api(`/api/admin/portals/${encodeURIComponent(state.portal)}/modules`,
      {method: "POST", body: JSON.stringify({menu: "mainMenu", type, enabled})});
      toast(enabled ? "Module enabled" : "Module disabled", "success"); V.modules(); } catch (e) { fail(e); }
  },

  // ---- vector styles ----
  searchStyles() { window.__styleQ = val("styq"); V.styles(); },
  newStyle() {
    $("#modal-root").innerHTML = `<div class="drawer-mask" onclick="App.closeModal()"></div>
      <div class="drawer"><div class="dhead"><h2>New style</h2>${UI.btn({icon:"x",variant:"ghost",onclick:"App.closeModal()"})}</div>
        <div class="dbody">${UI.field({label:"styleId (referenced by a layer's styleId)", control:`<input id="ns-id" placeholder="my-style">`})}
          <div style="height:1rem"></div>${UI.btn({label:"Create style", variant:"primary", icon:"plus", onclick:"App.createStyle()"})}</div></div>`;
    setTimeout(() => document.getElementById("ns-id")?.focus(), 30);
  },
  async createStyle() {
    try {
      const r = await api("/api/admin/styles", {method:"POST", body: JSON.stringify(
        {catalog: catalogOf(state.portal), styleId: val("ns-id")})});
      this.closeModal(); toast(`Style “${r.styleId}” created`, "success"); this.editStyle(r.key);
    } catch (e) { fail(e); }
  },
  async editStyle(key) {
    try {
      const d = await api(`/api/admin/styles/${encodeURIComponent(key)}`);
      _styleEdit = {key, styleId: d.styleId, attrs: d.attrs, usage: d.usage, mode: "form", confirmDel: false};
      styleWorking();  // normalize rules[0].style
      V.styles();
    } catch (e) { fail(e); }
  },
  async dupStyle(key, styleId) {
    try {
      const d = await api(`/api/admin/styles/${encodeURIComponent(key)}`);
      const r = await api("/api/admin/styles", {method:"POST", body: JSON.stringify(
        {catalog: catalogOf(state.portal), styleId: styleId + "-copy", attrs: d.attrs})});
      toast(`Duplicated → ${r.styleId}`, "success"); this.editStyle(r.key);
    } catch (e) { fail(e); }
  },
  closeStyle() { _styleEdit = null; V.styles(); },
  styleColor(prop) { styleWorking()[prop] = hexAlpha($("#" + prop + "-c").value, $("#" + prop + "-a").value); refreshPreview(); },
  styleNum(prop) { const v = $("#s-" + prop).value; const w = styleWorking(); if (v === "") delete w[prop]; else w[prop] = Number(v); refreshPreview(); },
  styleText(prop) { const v = $("#s-" + prop).value; const w = styleWorking(); if (v === "") delete w[prop]; else w[prop] = v; refreshPreview(); },
  styleMode(m) {
    if (m === "form") { const ta = $("#sty-json"); if (ta) { try { _styleEdit.attrs = JSON.parse(ta.value); } catch (e) { $("#sty-err").innerHTML = UI.banner("Invalid JSON: " + esc(e.message), "warn", "x"); return; } } }
    _styleEdit.mode = m; renderStyleEditor();
  },
  async saveStyle() {
    if (_styleEdit.mode === "raw") { const ta = $("#sty-json"); try { _styleEdit.attrs = JSON.parse(ta.value); } catch (e) { $("#sty-err").innerHTML = UI.banner("Invalid JSON: " + esc(e.message), "warn", "x"); return; } }
    try {
      const r = await api(`/api/admin/styles/${encodeURIComponent(_styleEdit.key)}`, {method:"PUT", body: JSON.stringify({attrs: _styleEdit.attrs})});
      _styleEdit.usage = r.usage; toast("Style saved to draft", "success"); renderStyleEditor();
    } catch (e) { fail(e); }
  },
  delStyle() { _styleEdit.confirmDel = true; renderStyleEditor(); },
  delCancel() { _styleEdit.confirmDel = false; renderStyleEditor(); },
  async delStyleConfirm() {
    try { await api(`/api/admin/styles/${encodeURIComponent(_styleEdit.key)}`, {method:"DELETE"});
      toast("Style deleted", "success"); this.closeStyle(); } catch (e) { fail(e); }
  },
  _parseAdv() {
    try { return {ok: JSON.parse($("#adv-json").value)}; }
    catch (e) { return {err: e.message}; }
  },
  formatConfig() {
    const p = this._parseAdv();
    if (p.err) { $("#adv-err").innerHTML = UI.banner("Invalid JSON: " + esc(p.err), "warn", "x"); return; }
    $("#adv-json").value = JSON.stringify(p.ok, null, 2); $("#adv-err").innerHTML = "";
  },
  async savePortalConfig() {
    const p = this._parseAdv();
    if (p.err) { $("#adv-err").innerHTML = UI.banner("Invalid JSON: " + esc(p.err), "warn", "x"); return; }
    try {
      const r = await api(`/api/admin/portals/${encodeURIComponent(state.portal)}/portal-config`,
        {method: "PUT", body: JSON.stringify({portal_config: p.ok})});
      $("#adv-err").innerHTML = r.warnings.length
        ? UI.banner("Saved with warnings: " + r.warnings.map(esc).join("; "), "warn") : "";
      toast(r.warnings.length ? `Saved (${r.warnings.length} warnings)` : "Config saved to draft", "success");
    } catch (e) { $("#adv-err").innerHTML = UI.banner(esc(e.message), "warn", "x"); }
  },

  async patchSvc(key, body) {
    try { await api(`/api/admin/services/${encodeURIComponent(key)}`, {method: "PATCH", body: JSON.stringify(body)});
      toast("Service updated", "success"); V.services(); } catch (e) { fail(e); }
  },
  searchServices() { window.__svcQ = val("svcq"); V.services(); },
  toggleOnlyIn(on) { window.__svcOnlyIn = on; V.services(); },

  _rm: (kind, payload) => UI.btn({label: "Remove", variant: "danger", size: "sm",
    onclick: `App.removeGrant('${kind}',${attr(JSON.stringify(payload))})`}),
  async addGrant(kind, payload) {
    try { await api(`/api/admin/grants/${kind}`, {method: "POST", body: JSON.stringify(payload)});
      toast("Grant added", "success"); V.grants(); } catch (e) { fail(e); }
  },
  async removeGrant(kind, payload) {
    try { await api(`/api/admin/grants/${kind}/delete`, {method: "POST", body: JSON.stringify(payload)});
      toast("Grant removed", "success"); V.grants(); } catch (e) { fail(e); }
  },

  async publish() {
    try { const r = await api(`/api/admin/portals/${encodeURIComponent(state.portal)}/publish`, {method: "POST"});
      toast(`Published v${r.version}`, "success"); V.publish(); } catch (e) { fail(e); }
  },
  async activate(version) {
    try { await api(`/api/admin/portals/${encodeURIComponent(state.portal)}/activate`,
      {method: "POST", body: JSON.stringify({version})});
      toast(version === null ? "Serving live draft" : `Rolled back to v${version}`, "success"); V.publish(); } catch (e) { fail(e); }
  },

  async importCaps(dry) {
    $("#imp-out").innerHTML = UI.empty({title: "Fetching capabilities…"});
    try {
      const data = await api("/api/admin/import-capabilities", {method: "POST", body: JSON.stringify(
        {url: val("imp-url"), catalog: val("imp-cat"), id_prefix: val("imp-prefix"), dry_run: dry})});
      const rows = data.layers.map(l => [`<span class="mono">${esc(l.id)}</span>`, esc(l.name), esc(l.layers)]);
      $("#imp-out").innerHTML = UI.card({title: dry ? "Preview" : "Imported", sub: `WMS ${data.version} · ${data.layers.length} layers`,
        flush: true, body: UI.table({cols: ["New ID", "Name", "WMS layer"], rows})});
      if (!dry) toast(`Imported ${data.layers.length} layers`, "success");
    } catch (e) { $("#imp-out").innerHTML = ""; fail(e); }
  },

  // tree
  treeReorder(uid, dir) { const h = locate(uid), j = h.index + dir; if (j < 0 || j >= h.parent.length) return;
    [h.parent[h.index], h.parent[j]] = [h.parent[j], h.parent[h.index]]; renderTree(); },
  treeRemove(uid) { const h = locate(uid); h.parent.splice(h.index, 1); renderTree(); },
  treeAddFolder(cuid) { containerArray(cuid).push({type: "folder", name: "New folder", elements: [], _uid: "u" + (UID++)}); renderTree(); },
  treeRename(uid, name) { locate(uid).node.name = name; },
  async pickStyle(uid) {
    STYLE_PICK_UID = uid;
    const cur = layerInfo(locate(uid).node).styleId;
    $("#modal-root").innerHTML = `<div class="drawer-mask" onclick="App.closeModal()"></div>
      <div class="drawer"><div class="dhead"><h2>Choose a style</h2>${UI.btn({icon:"x",variant:"ghost",onclick:"App.closeModal()"})}</div>
        <div class="dbody">
          <div class="hit" onclick="App.setLayerStyle(null)"><b>Default</b> <span class="lid">use the catalog service's style${cur?"":" (current)"}</span></div>
          <input id="sp-q" placeholder="search styleId…" oninput="App.pickStyleSearch()" style="margin:.5rem 0">
          <div id="sp-results">Loading…</div></div></div>`;
    setTimeout(() => document.getElementById("sp-q")?.focus(), 30);
    this.pickStyleSearch();
  },
  async pickStyleSearch() {
    try {
      const q = val("sp-q");
      const d = await api(`/api/admin/styles?catalog=${encodeURIComponent(TREE_CATALOG)}&q=${encodeURIComponent(q)}`);
      $("#sp-results").innerHTML = d.items.slice(0, 60).map(s =>
        `<div class="hit" onclick='App.setLayerStyle(${JSON.stringify(s.styleId)}, ${JSON.stringify(s.firstStyle || {})})'>
          ${swatch(s.firstStyle, 20)} <span class="mono">${esc(s.styleId)}</span>
          <span class="lid">${styleKind(s.firstStyle)}${s.usage ? " · " + s.usage + " layer(s)" : ""}</span></div>`).join("")
        || UI.empty({title: "No styles", icon: "brush"});
    } catch (e) { fail(e); }
  },
  setLayerStyle(styleId, firstStyle) {
    const node = locate(STYLE_PICK_UID).node;
    if (styleId === null) delete node.styleId;
    else { node.styleId = String(styleId); STYLE_SWATCHES[String(styleId)] = firstStyle || {}; }
    this.closeModal(); renderTree();
    toast(styleId === null ? "Layer set to default style (draft)" : `Style “${styleId}” applied to layer (draft)`, "success");
  },
  async saveTree() {
    try { const r = await api(`/api/admin/portals/${encodeURIComponent(state.portal)}/tree`,
      {method: "PUT", body: JSON.stringify({layer_config: stripUids(TREE)})});
      $("#tree-warn").innerHTML = r.warnings.length ? UI.banner(`Saved with ${r.warnings.length} warning(s): ` + r.warnings.map(esc).join("; "), "warn") : "";
      toast(r.warnings.length ? `Saved (${r.warnings.length} warnings)` : "Draft saved", "success"); } catch (e) { fail(e); }
  },
  openPicker(cuid) {
    PICK_TARGET = cuid;
    $("#picker-root").innerHTML = `<div class="drawer-mask" onclick="App.closePicker()"></div>
      <div class="drawer"><div class="dhead"><h2>Add layer</h2>
        ${UI.btn({icon: "x", variant: "ghost", onclick: "App.closePicker()"})}</div>
        <div class="dbody"><input id="pick-q" placeholder="Search catalog…" oninput="App.pickSearch()" autofocus>
          <div id="pick-results" style="margin-top:.6rem"></div></div></div>`;
    setTimeout(() => document.getElementById("pick-q")?.focus(), 30);
  },
  closePicker() { $("#picker-root").innerHTML = ""; PICK_TARGET = null; },
  async pickSearch() {
    const q = val("pick-q"); if (!q) { $("#pick-results").innerHTML = ""; return; }
    try {
      const data = await api(`/api/admin/services?catalog=${encodeURIComponent(TREE_CATALOG)}&q=${encodeURIComponent(q)}&limit=40`);
      $("#pick-results").innerHTML = data.items.map(s =>
        `<div class="hit" onclick='App.addLayer(${JSON.stringify(s.id)},${JSON.stringify(s.name || "")})'>
          ${esc(s.name || "—")} <span class="lid">${esc(s.id)} · ${esc(s.typ)}</span></div>`).join("")
        || UI.empty({title: "No matches", icon: "search"});
    } catch (e) { fail(e); }
  },
  addLayer(id, name) {
    if (!PICK_TARGET) return;
    if (name) NAMES[String(id).split(".")[0]] = name;
    containerArray(PICK_TARGET).push({id: String(id), _uid: "u" + (UID++)});
    App.closePicker(); renderTree(); toast("Layer added to draft", "success");
  },
};
window.App = App; window.val = val;

/* ============================ router ============================ */
function navigate() {
  const route = (location.hash.slice(1) || "settings");
  if (!PAGES[route]) { location.hash = "settings"; return; }
  if (route !== "styles") _styleEdit = null;   // leave the style editor when navigating away
  renderShell(route);
  (V[route] || (() => {}))();
}
window.addEventListener("hashchange", navigate);

async function boot() {
  try {
    const [me, portals] = await Promise.all([api("/api/admin/me"), api("/api/admin/portals")]);
    state.whoami = me.username;
    state.portals = portals;
    if (!state.portals.length) { document.body.innerHTML = "<p style='padding:2rem'>No portals imported yet.</p>"; return; }
    state.portal = state.portals[0].slug;
    navigate();
  } catch (e) { fail(e); }
}
boot();
</script>
