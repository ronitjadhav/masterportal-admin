# One-origin reverse proxy: the portal, the admin console, the config API + geo
# proxy, and the IdP all answer under https://<origin> — the golden rule the
# OIDC login depends on (an https page calling http:// is blocked as mixed
# content). Terminate TLS here; everything upstream is plain http on the
# compose network.

# Forwarded headers apply to every proxied location (inherited by proxy_pass).
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_http_version 1.1;

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Config payloads (services.json) can be large, and WFS-T POST bodies too.
    client_max_body_size 10m;

    # Masterportal static build — mount yours at ./deploy/portal. Until you do,
    # this 404s but the admin console (/admin/) still works.
    location / {
        root /usr/share/nginx/portal;
        try_files $uri $uri/ =404;
    }

    # Backend: per-role config, the geo reverse proxy, legends, admin console.
    location /api/     { proxy_pass http://backend:8000; }
    location /legends/ { proxy_pass http://backend:8000; }
    location /admin    { proxy_pass http://backend:8000; }
    location /healthz  { proxy_pass http://backend:8000; }
    location /docs     { proxy_pass http://backend:8000; }
    location /openapi.json { proxy_pass http://backend:8000; }

    # The geo proxy streams tiles/large GetFeature responses — don't buffer them.
    location /geo/ {
        proxy_pass http://backend:8000;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Keycloak (or any IdP you front here) under /auth.
    location /auth/ { proxy_pass http://keycloak:8080; }
}
